<!-- Reusable Monopo-style scroll indicator snippet -->
<button class="scroll-indicator" type="button" aria-label="scroll down">
  <span></span>
</button>

<style>
  .scroll-indicator {
    position: relative;
    display: block;
    width: 17px;
    height: 52.5px;
    color: currentColor;
  }

  .scroll-indicator::before,
  .scroll-indicator::after,
  .scroll-indicator span::before,
  .scroll-indicator span::after {
    position: absolute;
    content: "";
    background: currentColor;
  }

  .scroll-indicator::before {
    top: 0;
    left: 8px;
    width: 1px;
    height: 100%;
  }

  .scroll-indicator::after {
    right: 0;
    bottom: 0;
    width: 13px;
    height: 1px;
    transform: rotate(-45deg);
    transform-origin: right center;
  }

  .scroll-indicator span::before {
    bottom: 0;
    left: 0;
    width: 13px;
    height: 1px;
    transform: rotate(45deg);
    transform-origin: left center;
  }

  .scroll-indicator span::after {
    top: 6px;
    left: 7px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    animation: dotDrop 1.8s cubic-bezier(.165, .84, .44, 1) infinite;
  }

  @keyframes dotDrop {
    0% {
      transform: translateY(0);
      opacity: 0;
    }

    20%,
    70% {
      opacity: 1;
    }

    100% {
      transform: translateY(28px);
      opacity: 0;
    }
  }
</style>
